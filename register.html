<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Experience Portal - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <style>
    /* ====== Custom Styling ====== */
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(at 20% 20%, #1e3a8a, #0f172a 60%);
      color: #e0e7ff;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-effect {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-effect:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 50px rgba(147, 197, 253, 0.3);
    }

    input {
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 8px #60a5fa;
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-hover-effect {
      background: linear-gradient(90deg, #3b82f6, #9333ea);
      transition: background 0.4s ease, transform 0.3s ease;
    }

    .btn-hover-effect:hover {
      background: linear-gradient(90deg, #60a5fa, #a855f7);
      transform: scale(1.03);
    }

    /* Subtle floating background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      filter: blur(80px);
      animation: float 20s infinite alternate ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(-60px) translateX(40px); }
    }

    /* Headings */
    h1 {
      background: linear-gradient(to right, #60a5fa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body class="relative">

  <!-- Floating orbs background -->
  <div class="orb w-64 h-64 bg-blue-500 top-10 left-20"></div>
  <div class="orb w-96 h-96 bg-purple-600 bottom-10 right-10"></div>

  <!-- Main container -->
  <div class="relative z-10 w-full max-w-5xl mx-4">
    <div class="grid md:grid-cols-2 gap-10 items-center">

      <!-- Left: Visual / Description -->
      <div class="text-center md:text-left space-y-6">
        <h2 class="text-4xl font-extrabold leading-tight text-white">
          Welcome to the <span class="text-blue-400">Virtual Experience</span> Portal
        </h2>
        <p class="text-blue-100 text-lg">
          Step into a futuristic world — create your account and begin your digital journey today.
        </p>
        <div class="mt-8">
          <i class="fas fa-globe text-blue-400 text-6xl animate-pulse"></i>
        </div>
      </div>

      <!-- Right: Registration Form -->
      <div class="glass-effect p-8 rounded-2xl">
        <div class="text-center mb-8">
          <div
            class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center shadow-lg"
          >
            <i class="fas fa-user-plus text-white text-3xl"></i>
          </div>
          <h1 class="text-3xl font-bold mb-2">Create Your Account</h1>
          <p class="text-blue-200">Join the virtual world in one simple step</p>
        </div>

        <p id="error-msg" class="text-center text-red-400 mb-4 font-semibold"></p>

        <form id="registerForm" class="space-y-6" method="POST" action="/register">
          <div>
            <label for="username" class="block text-sm font-medium mb-2">Username</label>
            <div class="relative">
              <i class="fas fa-user absolute left-3 top-3 text-blue-300"></i>
              <input
                type="text"
                id="username"
                name="username"
                class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-blue-200"
                placeholder="Choose a username"
                required
              />
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium mb-2">Password</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-3 top-3 text-blue-300"></i>
              <input
                type="password"
                id="password"
                name="password"
                class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-blue-200"
                placeholder="Create a password"
                required
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full btn-hover-effect text-white py-3 px-4 rounded-lg font-semibold text-lg flex items-center justify-center"
          >
            <i class="fas fa-user-plus mr-2"></i>
            Create Account & Enter
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-blue-100">Already have an account?</p>
          <a
            href="login.html"
            class="text-blue-300 hover:text-white font-medium transition-colors"
            >Login Here</a
          >
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="absolute bottom-4 left-0 right-0 text-center text-sm text-blue-300">
    &copy; 2025 Virtual Experience Portal. All Rights Reserved.
  </div>

  <!-- Scripts (unchanged) -->
  <script>
    function createParticles() { /* ... unchanged ... */ }

    document.addEventListener('DOMContentLoaded', function () {
      createParticles();
      const inputs = document.querySelectorAll('input');
      inputs.forEach((input) => { /* ... unchanged ... */ });

      const urlParams = new URLSearchParams(window.location.search);
      const error = urlParams.get('error');
      if (error) {
        document.getElementById('error-msg').textContent = decodeURIComponent(
          error.replace(/\+/g, ' ')
        );
      }
    });
  </script>
</body>
</html>
